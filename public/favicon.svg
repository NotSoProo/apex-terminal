<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.04"/>
  <!-- Big bold N -->
  <text x="200" y="340" text-anchor="middle" fill="#fafafa" font-size="280" font-weight="800" font-family="'Arial Black', 'Inter', sans-serif" letter-spacing="-10">N</text>
  <!-- Gold accent slash -->
  <line x1="295" y1="80" x2="430" y2="432" stroke="url(#slash)" stroke-width="28" stroke-linecap="round"/>
  <!-- SF small -->
  <text x="390" y="470" text-anchor="middle" fill="#d4a574" font-size="72" font-weight="700" font-family="'Arial', 'Inter', sans-serif" letter-spacing="8" opacity="0.9">SF</text>
</svg>
